name: Publish npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: Published release version, e.g. 0.2.0 or v0.2.0
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish noisegate npm installer
    runs-on: ubuntu-latest
    environment: npm
    defaults:
      run:
        working-directory: npm/noisegate

    steps:
      - name: Checkout release tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: ${{ startsWith(inputs.version, 'v') && inputs.version || format('v{0}', inputs.version) }}

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate release metadata
        working-directory: ${{ github.workspace }}
        env:
          RELEASE_REF: ${{ inputs.version }}
        run: |
          set -euo pipefail
          RELEASE_TAG="v${RELEASE_REF#v}"
          python scripts/check_release.py --tag "$RELEASE_TAG"
          python scripts/check_contributors.py

      - name: Validate package
        run: |
          set -euo pipefail
          npm test
          npm pack --dry-run

      - name: Wait for matching PyPI package
        working-directory: ${{ github.workspace }}
        env:
          RELEASE_REF: ${{ inputs.version }}
        run: |
          set -euo pipefail
          export VERSION="${RELEASE_REF#v}"
          python - <<'PY'
          import os
          import time
          import urllib.error
          import urllib.request

          version = os.environ["VERSION"]
          url = f"https://pypi.org/pypi/noisegate-hermes/{version}/json"
          for attempt in range(1, 31):
              try:
                  with urllib.request.urlopen(url, timeout=10) as response:
                      if response.status == 200:
                          print(f"noisegate-hermes=={version} is visible on PyPI")
                          break
              except urllib.error.HTTPError as exc:
                  if exc.code != 404:
                      raise
              except urllib.error.URLError:
                  if attempt == 30:
                      raise
              print(f"waiting for {url} (attempt {attempt}/30)")
              time.sleep(10)
          else:
              raise SystemExit(f"noisegate-hermes=={version} is not visible on PyPI")
          PY

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
