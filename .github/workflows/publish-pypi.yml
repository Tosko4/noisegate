name: Publish PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: Published release version, e.g. 0.2.0 or v0.2.0
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish noisegate-hermes to PyPI
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Checkout release tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: ${{ startsWith(inputs.version, 'v') && inputs.version || format('v{0}', inputs.version) }}

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Validate release metadata
        env:
          RELEASE_REF: ${{ inputs.version }}
        run: |
          set -euo pipefail
          RELEASE_TAG="v${RELEASE_REF#v}"
          uv run python scripts/check_release.py --tag "$RELEASE_TAG"
          uv run python scripts/check_contributors.py

      - name: Quality gate
        run: |
          set -euo pipefail
          uv run ruff check .
          uv run python -m pytest -q
          rm -rf dist
          uv build
          uvx twine check dist/*
          git diff --check

      - name: Publish to PyPI with trusted publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist
          skip-existing: true
