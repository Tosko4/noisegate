name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semantic version to release, e.g. 0.2.0
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.event_name == 'push' && github.ref_name || github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main'
    outputs:
      release-tag: ${{ steps.release-vars.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Set release variables
        id: release-vars
        env:
          RELEASE_REF: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.version }}
        run: |
          set -euo pipefail
          echo "tag=v${RELEASE_REF#v}" >> "$GITHUB_OUTPUT"

      - name: Prepare release metadata for manual release
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          uv run python scripts/prepare_release.py "$RELEASE_VERSION"

      - name: Validate release metadata
        env:
          RELEASE_REF: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.version }}
        run: |
          set -euo pipefail
          RELEASE_TAG="v${RELEASE_REF#v}"
          uv run python scripts/check_release.py --tag "$RELEASE_TAG"
          uv run python scripts/check_contributors.py

      - name: Quality gate
        run: |
          set -euo pipefail
          uv run ruff check .
          uv run python -m pytest -q
          (cd npm/noisegate && npm ci --ignore-scripts && npm test && npm pack --dry-run)
          rm -rf dist
          uv build
          uvx twine check dist/*
          git diff --check

      - name: Upload Python distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error

      - name: Commit version bump and tag for manual release
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_VERSION#v}"
          TAG="v$VERSION"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if ! git diff --quiet; then
            git add \
              pyproject.toml \
              noisegate/_version.py \
              noisegate/plugin.yaml \
              CHANGELOG.md \
              uv.lock \
              npm/noisegate/package.json \
              npm/noisegate/package-lock.json
            git commit -m "release: $TAG"
          fi
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists locally"
            if [ "$(git rev-parse "$TAG^{commit}")" != "$(git rev-parse HEAD)" ]; then
              echo "Tag $TAG exists but does not point at HEAD" >&2
              exit 1
            fi
          else
            git tag -a "$TAG" -m "Noisegate $TAG"
          fi
          git push origin HEAD:main
          git push origin "$TAG"

      - name: Build release notes
        env:
          RELEASE_REF: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.version }}
        run: |
          set -euo pipefail
          RELEASE_TAG="v${RELEASE_REF#v}"
          uv run python scripts/build_release_notes.py "$RELEASE_TAG" --output dist/release-notes.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_REF: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.version }}
        run: |
          set -euo pipefail
          RELEASE_TAG="v${RELEASE_REF#v}"
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* \
              --title "Noisegate $RELEASE_TAG" \
              --notes-file dist/release-notes.md \
              --verify-tag
          fi

  publish_pypi:
    name: Publish noisegate-hermes to PyPI
    needs: release
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release.outputs.release-tag }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Validate release metadata
        env:
          RELEASE_REF: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.version }}
        run: |
          set -euo pipefail
          RELEASE_TAG="v${RELEASE_REF#v}"
          uv run python scripts/check_release.py --tag "$RELEASE_TAG"
          uv run python scripts/check_contributors.py

      - name: Download Python distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist

      - name: Publish to PyPI with trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  publish_npm:
    name: Publish noisegate npm installer
    needs: [release, publish_pypi]
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: npm/noisegate

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release.outputs.release-tag }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate release metadata
        working-directory: ${{ github.workspace }}
        env:
          RELEASE_REF: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.version }}
        run: |
          set -euo pipefail
          RELEASE_TAG="v${RELEASE_REF#v}"
          python scripts/check_release.py --tag "$RELEASE_TAG"
          python scripts/check_contributors.py

      - name: Validate package
        run: |
          set -euo pipefail
          npm test
          npm pack --dry-run

      - name: Wait for matching PyPI package
        working-directory: ${{ github.workspace }}
        env:
          RELEASE_REF: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.version }}
        run: |
          set -euo pipefail
          export VERSION="${RELEASE_REF#v}"
          python - <<'PY'
          import os
          import time
          import urllib.error
          import urllib.request

          version = os.environ["VERSION"]
          url = f"https://pypi.org/pypi/noisegate-hermes/{version}/json"
          for attempt in range(1, 31):
              try:
                  with urllib.request.urlopen(url, timeout=10) as response:
                      if response.status == 200:
                          print(f"noisegate-hermes=={version} is visible on PyPI")
                          break
              except urllib.error.HTTPError as exc:
                  if exc.code != 404:
                      raise
              except urllib.error.URLError:
                  if attempt == 30:
                      raise
              print(f"waiting for {url} (attempt {attempt}/30)")
              time.sleep(10)
          else:
              raise SystemExit(f"noisegate-hermes=={version} is not visible on PyPI")
          PY

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
