name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Ruff
        run: uv run ruff check .

      - name: Tests
        run: uv run python -m pytest -q

      - name: Release metadata check
        run: uv run python scripts/check_release.py

      - name: Contributor check
        run: uv run python scripts/check_contributors.py

      - name: Build package
        run: |
          uv build
          uvx twine check dist/*

      - name: Validate npm installer wrapper
        working-directory: npm/noisegate
        run: |
          npm ci --ignore-scripts
          npm test
          npm pack --dry-run

      - name: Wheel install smoke
        shell: bash
        run: |
          set -euo pipefail
          python -m venv /tmp/noisegate-wheel-smoke
          uv pip install --python /tmp/noisegate-wheel-smoke/bin/python dist/*.whl
          /tmp/noisegate-wheel-smoke/bin/noisegate doctor
          /tmp/noisegate-wheel-smoke/bin/python - <<'PY'
          import importlib.metadata as md
          import json
          from noisegate.plugin import transform_tool_result
          print('version', md.version('noisegate-hermes'))
          long='\n'.join(f'line {i:03d}' for i in range(200))
          assert transform_tool_result(json.dumps({'output': long}), tool_name='terminal') is not None
          assert transform_tool_result(json.dumps({'content': long}), tool_name='web_extract') is None
          PY

      - name: Upload dist artifacts
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: noisegate-dist
          path: dist/*
